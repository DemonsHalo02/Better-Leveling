<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Better Leveling</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <canvas id="bg-canvas"></canvas>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <input id="gate-pass" placeholder="Enter pass" />
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="hidden">

    <!-- NAV -->
    <nav>
      <button class="nav-tab" onclick="showPage('quests', this)">Quests</button>
      <button class="nav-tab" onclick="showPage('train', this)">Train</button>
      <button class="nav-tab" onclick="showPage('nutrition', this)">Nutrition</button>
      <button class="nav-tab" onclick="showPage('settings', this)">Settings</button>
    </nav>

    <!-- PAGES -->
    <div id="page-quests" class="page"></div>
    <div id="page-train" class="page"></div>
    <div id="page-nutrition" class="page"></div>
    <div id="page-settings" class="page"></div>

  </div>

  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
