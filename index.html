<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Better Leveling</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- CANVAS BACKGROUND -->
  <canvas id="bg-canvas"></canvas>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-wrap hidden">
    <!-- Optional glowing ring effect -->
    <div class="login-glow-ring"></div>

    <!-- Login card -->
    <div class="login-card">
      <!-- Card corners -->
      <div class="card-corner tl"></div>
      <div class="card-corner tr"></div>
      <div class="card-corner bl"></div>
      <div class="card-corner br"></div>

      <!-- Header -->
      <div class="section-head">Enter Your Name</div>

      <!-- Input field -->
      <input id="gate-pass" class="sys-input" placeholder="Type your name..." />

      <!-- Error message -->
      <div id="login-error" class="error-msg"></div>

      <!-- Login button -->
      <button class="btn-primary" onclick="handleGateLogin()">Start</button>

      <!-- Optional demo note -->
      <div class="demo-note">Demo mode: type anything to continue</div>
    </div>
  </div>

  <!-- MAIN APP SCREEN -->
  <div id="app-screen" class="app-wrap hidden">

    <!-- NAV TABS -->
    <nav class="nav-tabs">
      <button class="nav-tab" onclick="showPage('quests', this)">Quests</button>
      <button class="nav-tab" onclick="showPage('train', this)">Train</button>
      <button class="nav-tab" onclick="showPage('nutrition', this)">Nutrition</button>
      <button class="nav-tab" onclick="showPage('settings', this)">Settings</button>
    </nav>

    <!-- PAGES WRAPPER -->
    <div class="pages-wrap">
      <div id="page-quests" class="page"></div>
      <div id="page-train" class="page"></div>
      <div id="page-nutrition" class="page"></div>
      <div id="page-settings" class="page"></div>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
